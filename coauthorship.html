<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCC Co-authorship Network</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            overflow: hidden;
        }
        #graph {
            width: 100%;
            height: calc(100vh - 56px);
        }
        .tooltip-box {
            position: absolute;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            max-width: 260px;
        }
        .tooltip-box.visible {
            opacity: 1;
        }
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.95);
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">KCC Co-authorship Network</span>
            <form class="d-flex mx-auto" role="search" onsubmit="return false;">
                <label for="search" class="visually-hidden">Search authors</label>
                <input id="search" class="form-control form-control-sm me-2" type="search"
                       placeholder="Search author..." style="width: 250px;">
                <button class="btn btn-sm btn-outline-light" type="button" id="clear-btn">Clear</button>
            </form>
            <span class="navbar-text text-light" id="stats"></span>
        </div>
    </nav>

    <div id="graph"></div>
    <div class="tooltip-box" id="tooltip"></div>
    <div class="legend">
        <div class="legend-item">
            <div class="legend-swatch" style="background: #1f77b4;"></div>
            <span>KCC-affiliated author</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: #aaa;"></div>
            <span>External co-author</span>
        </div>
        <div class="legend-item" style="margin-top: 6px;">
            <span>Node size = number of works</span>
        </div>
        <div class="legend-item">
            <span>Line thickness = shared papers</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script>
        const container = document.getElementById("graph");
        const tooltip = document.getElementById("tooltip");
        const width = container.clientWidth;
        const height = container.clientHeight;

        const svg = d3.select("#graph")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // Zoom group
        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([0.1, 8])
            .on("zoom", (event) => g.attr("transform", event.transform));

        // Start zoomed out so the full graph is visible immediately
        const initialTransform = d3.zoomIdentity.translate(width / 2, height / 2).scale(0.15).translate(-width / 2, -height / 2);
        svg.call(zoom).call(zoom.transform, initialTransform);

        d3.json("coauthorship.json").then(data => {
            document.getElementById("stats").textContent =
                `${data.nodes.length} authors · ${data.links.length} co-authorships`;

            // Scales
            const maxWorks = d3.max(data.nodes, d => d.works) || 1;
            const rScale = d3.scaleSqrt().domain([0, maxWorks]).range([14, 60]);

            const maxWeight = d3.max(data.links, d => d.weight) || 1;
            const strokeScale = d3.scaleLinear().domain([1, maxWeight]).range([1, 8]);

            // Simulation
            const simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links)
                    .id(d => d.id)
                    .distance(40))
                .force("charge", d3.forceManyBody().strength(-40))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(d => rScale(d.works) + 1));

            // Links
            const link = g.append("g")
                .attr("stroke", "#555")
                .attr("stroke-opacity", 0.7)
                .selectAll("line")
                .data(data.links)
                .join("line")
                .attr("stroke-width", d => strokeScale(d.weight));

            // Nodes
            const node = g.append("g")
                .selectAll("circle")
                .data(data.nodes)
                .join("circle")
                .attr("r", d => rScale(d.works))
                .attr("fill", d => d.kcc ? "#1f77b4" : "#aaa")
                .attr("stroke", "#fff")
                .attr("stroke-width", 1)
                .call(drag(simulation));

            // Hover
            node.on("mouseover", (event, d) => {
                tooltip.classList.add("visible");
                tooltip.innerHTML =
                    `<strong>${d.name}</strong><br>` +
                    `Works: ${d.works}<br>` +
                    `Citations: ${d.citations}<br>` +
                    (d.kcc ? "KCC-affiliated" : "External co-author");
            })
            .on("mousemove", (event) => {
                tooltip.style.left = (event.pageX + 12) + "px";
                tooltip.style.top = (event.pageY - 28) + "px";
            })
            .on("mouseout", () => {
                tooltip.classList.remove("visible");
            });

            // Tick — also fit-to-bounds once after layout has mostly stabilised
            let ticks = 0;
            let hasFitted = false;

            function fitToView() {
                const bounds = g.node().getBBox();
                if (bounds.width === 0 || bounds.height === 0) return;
                const pad = 40;
                const scale = Math.min(
                    width / (bounds.width + pad * 2),
                    height / (bounds.height + pad * 2)
                );
                const tx = width / 2 - (bounds.x + bounds.width / 2) * scale;
                const ty = height / 2 - (bounds.y + bounds.height / 2) * scale;
                svg.transition().duration(750)
                    .call(zoom.transform,
                        d3.zoomIdentity.translate(tx, ty).scale(scale));
            }

            simulation.on("tick", () => {
                ticks++;
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);
                node
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y);

                // Fit after 150 ticks (layout is mostly stable by then)
                if (!hasFitted && ticks >= 150) {
                    hasFitted = true;
                    fitToView();
                }
            });

            simulation.on("end", () => {
                if (!hasFitted) {
                    hasFitted = true;
                    fitToView();
                }
            });

            // Search functionality
            const searchInput = document.getElementById("search");
            const clearBtn = document.getElementById("clear-btn");

            function resetHighlight() {
                node.attr("fill", d => d.kcc ? "#1f77b4" : "#aaa")
                    .attr("stroke", "#fff")
                    .attr("stroke-width", 1)
                    .attr("opacity", 1);
                link.attr("opacity", 1);
            }

            function doSearch() {
                const query = searchInput.value.trim().toLowerCase();
                if (!query) {
                    resetHighlight();
                    return;
                }

                const matches = data.nodes.filter(d =>
                    d.name.toLowerCase().includes(query));
                const matchIds = new Set(matches.map(d => d.id));

                // Dim non-matches, highlight matches
                node.attr("opacity", d => matchIds.has(d.id) ? 1 : 0.1)
                    .attr("stroke", d => matchIds.has(d.id) ? "#ff0" : "#fff")
                    .attr("stroke-width", d => matchIds.has(d.id) ? 3 : 1);
                link.attr("opacity", d =>
                    matchIds.has(d.source.id) || matchIds.has(d.target.id) ? 1 : 0.05);

                // Zoom to first match
                if (matches.length > 0) {
                    const target = matches[0];
                    const scale = 1.5;
                    const tx = width / 2 - target.x * scale;
                    const ty = height / 2 - target.y * scale;
                    svg.transition().duration(750)
                        .call(zoom.transform,
                            d3.zoomIdentity.translate(tx, ty).scale(scale));
                }
            }

            searchInput.addEventListener("input", doSearch);
            clearBtn.addEventListener("click", () => {
                searchInput.value = "";
                resetHighlight();
                fitToView();
            });
        });

        function drag(simulation) {
            return d3.drag()
                .on("start", (event, d) => {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x;
                    d.fy = d.y;
                })
                .on("drag", (event, d) => {
                    d.fx = event.x;
                    d.fy = event.y;
                })
                .on("end", (event, d) => {
                    if (!event.active) simulation.alphaTarget(0);
                    d.fx = null;
                    d.fy = null;
                });
        }
    </script>
</body>
</html>
